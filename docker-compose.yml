services:
  dppb2_map_init:
    image: dppb2-server:local
    build: .
    restart: on-failure:5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    user: "0:0"
    entrypoint:
      - /bin/sh
      - -lc
    volumes:
      - ./pball:/pball
      - ./pball/maps:/maps
      - ./config.yaml:/config/config.yaml
      - ./scripts:/scripts:ro
    command:
      - |
        set -e
        BIN_SRC="/home/dpserver/pball/gamei386.so"
        BIN_DST="/pball/gamei386.so"
        CFG_SRC_DIR="/home/dpserver/pball/configs"
        CFG_DST_DIR="/pball/configs"
        BASE_TEXTURES_SRC_DIR="/home/dpserver/pball/textures"
        TEXTURE_DST_DIR="/pball/textures"
        TEXTURE_SRC_BASE_URL="http://dplogin.com/files/textures"
        mkdir -p /pball
        mkdir -p /maps
        mkdir -p "$$CFG_DST_DIR"
        mkdir -p "$$TEXTURE_DST_DIR"

        if [ ! -s "$$BIN_DST" ]; then
          echo "Copying gamei386.so to $$BIN_DST"
          cp "$$BIN_SRC" "$$BIN_DST"
        fi

        if [ -d "$$BASE_TEXTURES_SRC_DIR/pball" ]; then
          mkdir -p "$$TEXTURE_DST_DIR/pball"
          cp -a "$$BASE_TEXTURES_SRC_DIR/pball/." "$$TEXTURE_DST_DIR/pball/"
        fi

        if [ -d "$$BASE_TEXTURES_SRC_DIR/sfx" ]; then
          mkdir -p "$$TEXTURE_DST_DIR/sfx"
          cp -a "$$BASE_TEXTURES_SRC_DIR/sfx/." "$$TEXTURE_DST_DIR/sfx/"
        fi

        ensure_texture() {
          tex_path="$$1"
          tex_group="$${tex_path%%/*}"
          tex_name="$${tex_path#*/}"
          dst_dir="$$TEXTURE_DST_DIR/$$tex_group"
          mkdir -p "$$dst_dir"

          for ext in jpg tga wal png pcx; do
            if [ -s "$$dst_dir/$$tex_name.$$ext" ]; then
              return 0
            fi
          done

          for ext in jpg tga wal png pcx; do
            src_url="$$TEXTURE_SRC_BASE_URL/$$tex_group/$$tex_name.$$ext"
            if wget -q --spider "$$src_url"; then
              echo "Downloading $$tex_path.$$ext"
              wget -q -O "$$dst_dir/$$tex_name.$$ext" "$$src_url"
              return 0
            fi
          done

          echo "Warning: could not download texture $$tex_path" >&2
          return 1
        }

        missing_map_textures=0
        for mapname in $$(python3 /scripts/config_maps.py --config /config/config.yaml); do
          MAP_FILE="/maps/$${mapname}.bsp"
          MAP_URL="http://dplogin.com/files/maps/$${mapname}.bsp"
          if [ -d "$$MAP_FILE" ]; then
            rm -rf "$$MAP_FILE"
          fi
          if [ ! -s "$$MAP_FILE" ]; then
            echo "Downloading $$mapname.bsp to $$MAP_FILE"
            wget -q -O "$$MAP_FILE" "$$MAP_URL" || { rm -f "$$MAP_FILE"; echo "ERROR: wget failed for $$MAP_URL" >&2; exit 1; }
            if [ ! -s "$$MAP_FILE" ]; then
              echo "ERROR: map file is empty after download: $$MAP_FILE" >&2
              exit 1
            fi
          fi
          tex_list=$$(mktemp)
          python3 /scripts/list_bsp_textures.py "$$MAP_FILE" > "$$tex_list"
          while IFS= read -r tex || [ -n "$$tex" ]; do
            [ -z "$$tex" ] && continue
            if ! ensure_texture "$$tex"; then
              missing_map_textures=$$((missing_map_textures + 1))
            fi
          done < "$$tex_list"
          rm -f "$$tex_list"
        done

        if [ "$$missing_map_textures" -gt 0 ]; then
          echo "Warning: $$missing_map_textures map textures are still missing." >&2
        fi

        for cfg in default.cfg rotation.txt commands.txt; do
          if [ ! -s "$$CFG_DST_DIR/$$cfg" ]; then
            echo "Copying $$cfg to $$CFG_DST_DIR/$$cfg"
            cp "$$CFG_SRC_DIR/$$cfg" "$$CFG_DST_DIR/$$cfg"
          fi
        done

        sh /scripts/apply-config.sh "$$CFG_DST_DIR"

        # Own everything under ./pball like the bind mount root (host user), not root:root.
        if [ -d /pball ]; then
          PB_OWNER=$$(stat -c '%u:%g' /pball)
          chown -R "$$PB_OWNER" /pball/maps /pball/textures /pball/configs 2>/dev/null || true
          [ -f /pball/gamei386.so ] && chown "$$PB_OWNER" /pball/gamei386.so 2>/dev/null || true
        fi
        chmod -R a+rwX /pball/maps /pball/textures "$$CFG_DST_DIR" 2>/dev/null || true
        [ -f /pball/gamei386.so ] && chmod a+rw /pball/gamei386.so 2>/dev/null || true
        [ -f /config/config.yaml ] && chmod a+rw /config/config.yaml || true
        [ -f /config/config.yml ] && chmod a+rw /config/config.yml || true

  dppb2:
    image: dppb2-server:local
    build: .
    container_name: dppb2
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      dppb2_map_init:
        condition: service_completed_successfully
    ports:
      - "27910:27910/udp"
    volumes:
      - ./pball/maps:/paintball2/pball/maps:ro
      - ./pball/textures:/paintball2/pball/textures:ro
      - ./pball/configs:/paintball2/pball/configs:rw
      - ./config.yaml:/config/config.yaml:ro
      - ./scripts:/scripts:ro
    entrypoint:
      - /bin/sh
      - -lc
    command:
      - |
        set -e
        sh /scripts/apply-config.sh /paintball2/pball/configs
        exec sh /scripts/start_dedicated.sh
