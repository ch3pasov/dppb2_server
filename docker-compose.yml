services:
  dppb2_map_init:
    image: nukla/paintball2:latest
    restart: on-failure:5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    user: "0:0"
    entrypoint:
      - /bin/sh
      - -lc
    volumes:
      - ./pball:/pball
      - ./pball/maps:/maps
      - ./config:/config
    command:
      - |
        set -e
        BIN_SRC="/home/dpserver/pball/gamei386.so"
        BIN_DST="/pball/gamei386.so"
        CFG_SRC_DIR="/home/dpserver/pball/configs"
        CFG_DST_DIR="/pball/configs"
        MAP_FILE="/maps/italy.bsp"
        MAP_URL="http://dplogin.com/files/maps/italy.bsp"
        mkdir -p /pball
        mkdir -p /maps
        mkdir -p "$$CFG_DST_DIR"

        if [ ! -s "$$BIN_DST" ]; then
          echo "Copying gamei386.so to $$BIN_DST"
          cp "$$BIN_SRC" "$$BIN_DST"
        fi

        # Handle corrupted state if italy.bsp accidentally exists as a directory
        if [ -d "$$MAP_FILE" ]; then
          rm -rf "$$MAP_FILE"
        fi

        if [ ! -s "$$MAP_FILE" ]; then
          echo "Downloading italy.bsp to $$MAP_FILE"
          wget -q -O "$$MAP_FILE" "$$MAP_URL"
        fi

        for cfg in default.cfg rotation.txt commands.txt; do
          if [ ! -s "$$CFG_DST_DIR/$$cfg" ]; then
            echo "Copying $$cfg to $$CFG_DST_DIR/$$cfg"
            cp "$$CFG_SRC_DIR/$$cfg" "$$CFG_DST_DIR/$$cfg"
          fi
        done

        # Always sync user-managed configs into runtime config dir.
        if [ -s "/config/server.cfg" ]; then
          cp "/config/server.cfg" "$$CFG_DST_DIR/server.cfg"
        fi

        if [ -s "/config/motd.txt" ]; then
          cp "/config/motd.txt" "$$CFG_DST_DIR/motd.txt"
        fi

        # Keep configs editable from the host even if created by root in container.
        chmod -R a+rwX "$$CFG_DST_DIR"
        [ -f /config/server.cfg ] && chmod a+rw /config/server.cfg || true
        [ -f /config/motd.txt ] && chmod a+rw /config/motd.txt || true

  dppb2:
    image: nukla/paintball2:latest
    container_name: dppb2
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      dppb2_map_init:
        condition: service_completed_successfully
    ports:
      - "27910:27910/udp"
    volumes:
      - ./pball/maps/italy.bsp:/paintball2/pball/maps/italy.bsp:ro
      - ./pball/configs:/paintball2/pball/configs:ro
    command:
      - +set
      - dedicated
      - "1"
      - +exec
      - server.cfg
      - +map
      - italy
